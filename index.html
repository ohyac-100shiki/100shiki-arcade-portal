<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100shiki Arcade - 自作ブラウザゲーム集</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }
        header {
            background-color: #2c3e50;
            width: 100%;
            padding: 40px 0;
            text-align: center;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 { margin: 0; font-size: 2.5rem; letter-spacing: 2px; }
        .container {
            max-width: 900px;
            width: 95%;
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding-bottom: 50px;
        }
        .game-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            text-decoration: none;
            color: inherit;
            border: 2px solid transparent;
        }
        .game-card:hover {
            transform: translateY(-10px);
            border-color: #3498db;
        }
        .icon { font-size: 3rem; margin-bottom: 15px; display: block; }
        .game-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; color: #2c3e50; }
        .game-desc { font-size: 0.9rem; color: #666; line-height: 1.6; }
        footer { margin-top: auto; padding: 20px; color: #999; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <h1>100shiki Arcade</h1>
        <p>自作ブラウザゲーム・ポータルサイト</p>
    </header>

    <div class="container">
        <!-- タイピングゲームへのリンク -->
        <a href="./typing-01/index.html" class="game-card">
            <span class="icon">⌨️</span>
            <div class="game-title">47都道府県タイピング</div>
            <div class="game-desc">日本の全47都道府県を素早く正確に入力！練習モードとクイズモードを搭載しています。</div>
        </a>

        <!-- 絵文字ローグへのリンク -->
        <a href="./EmojiRogue/index.html" class="game-card">
            <span class="icon">⚔️</span>
            <div class="game-title">絵文字ローグ</div>
            <div class="game-desc">絵文字で描かれた世界を探索するローグライクゲーム。ブラウザで手軽に冒険が楽しめます。</div>
        </a>
    </div>

    <footer>
        &copy; 2024 100shiki Arcade. Built with Cursor.
    </footer>

</body>
</html>
